<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="180" height="180" rx="40" fill="url(#grad1)"/>
  
  <!-- 地铁车厢 -->
  <rect x="40" y="50" width="100" height="80" rx="12" fill="white" opacity="0.95"/>
  
  <!-- 车窗 -->
  <rect x="50" y="65" width="35" height="30" rx="4" fill="#3b82f6"/>
  <rect x="95" y="65" width="35" height="30" rx="4" fill="#3b82f6"/>
  
  <!-- 车门 -->
  <rect x="70" y="105" width="40" height="20" rx="2" fill="#1d4ed8"/>
  
  <!-- 车轮 -->
  <circle cx="60" cy="135" r="8" fill="#1d4ed8"/>
  <circle cx="120" cy="135" r="8" fill="#1d4ed8"/>
  
  <!-- 时钟图标 -->
  <circle cx="150" cy="40" r="18" fill="#f59e0b" opacity="0.95"/>
  <line x1="150" y1="40" x2="150" y2="32" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="150" y1="40" x2="156" y2="44" stroke="white" stroke-width="2" stroke-linecap="round"/>
</svg>
